<template>
    <div class="dashboard-wrapper">

        <!-- Action Buttons -->
        <div class="action-bar">
            <lightning-button 
                label="New Borrowing"
                variant="brand"
                onclick={handleNew}>
            </lightning-button>

            <lightning-button 
                label="Edit Borrowing"
                variant="brand"
                onclick={handleEdit}>
            </lightning-button>

            <lightning-button 
                label="Delete Borrowing"
                variant="brand"
                onclick={openDeleteModal}>
            </lightning-button>
        </div>

        <!-- Summary Cards -->
        <div class="summary-container">
            <div class="summary-card active">
                <h2>{activeCount}</h2>
                <p>Active</p>
            </div>

            <div class="summary-card returned">
                <h2>{returnedCount}</h2>
                <p>Returned</p>
            </div>

            <div class="summary-card overdue">
                <h2>{overdueCount}</h2>
                <p>Overdue</p>
            </div>

            <div class="summary-card fine">
                <h2>₹ {totalFine}</h2>
                <p>Total Fine</p>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-wrapper">
            <lightning-datatable
                key-field="Id"
                data={records}
                columns={columns}
                onrowselection={handleRowSelection}>
            </lightning-datatable>
        </div>


        <div class="pagination-container">
    <lightning-button
        label="Previous"
        onclick={handlePrevious}
        disabled={isFirstPage}>
    </lightning-button>

    <span class="page-info">
        Page {currentPage} of {totalPages}
    </span>

    <lightning-button
        label="Next"
        onclick={handleNext}
        disabled={isLastPage}>
    </lightning-button>
</div>

        <!-- Delete Modal -->
        <template if:true={showDeleteModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Confirm Delete</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        Are you sure you want to delete this borrowing record?
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeDeleteModal}></lightning-button>
                        <lightning-button variant="brand" label="Delete" onclick={confirmDelete}></lightning-button>
                    </footer>

                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </div>
</template>
