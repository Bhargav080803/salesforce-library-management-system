<template>
    <div class="dashboard-wrapper">

        <!-- Action Buttons -->
        <div class="action-bar">
            <lightning-button 
                label="New Book"
                variant="brand"
                onclick={handleNewBook}>
            </lightning-button>

            <lightning-button 
                label="Edit Book"
                variant="brand"
                onclick={handleEditBook}>
            </lightning-button>

            <lightning-button 
                label="Delete Book"
                variant="brand"
                onclick={openDeleteModal}>
            </lightning-button>
        </div>

        <!-- Summary Cards -->
        <div class="summary-container">
            <div class="summary-card total">
                <h2>{totalBooks}</h2>
                <p>Total Books</p>
            </div>

            <div class="summary-card available">
                <h2>{availableCount}</h2>
                <p>Available</p>
            </div>

            <div class="summary-card issued">
                <h2>{issuedCount}</h2>
                <p>Issued</p>
            </div>

            <div class="summary-card reserved">
                <h2>{reservedCount}</h2>
                <p>Reserved</p>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-wrapper">
            <lightning-datatable
                key-field="Id"
                data={records}
                columns={columns}
                onrowselection={handleRowSelection}>
            </lightning-datatable>
        </div>

        <div class="pagination-container">
    <lightning-button
        label="Previous"
        onclick={handlePrevious}
        disabled={isFirstPage}>
    </lightning-button>

    <span class="page-info">
        Page {currentPage} of {totalPages}
    </span>

    <lightning-button
        label="Next"
        onclick={handleNext}
        disabled={isLastPage}>
    </lightning-button>
</div>

        <!-- Delete Modal -->
        <template if:true={showDeleteModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Confirm Delete</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        Are you sure you want to delete this book?
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeDeleteModal}></lightning-button>
                        <lightning-button variant="brand" label="Delete" onclick={confirmDelete}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </div>
</template>
