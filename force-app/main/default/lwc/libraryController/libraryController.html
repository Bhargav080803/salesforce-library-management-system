<template>
    
    <div class="theme-dark">
        <lightning-card>
            <h1 style="display: flex; justify-content: center; align-items: center;font-size: 30px;">Library Management System</h1>
            <lightning-tabset>
                <lightning-tab label="Books">
                    <template if:true={BookData}>
                        <lightning-datatable key-field="Id" data={BookData} columns={BookColumns} hide-checkbox-column="false"></lightning-datatable>
                    </template>
                    <template if:false={BookData}>
                        <div class="slds-text-heading_medium slds-p-around_medium">
                            No books found.
                        </div>
                    </template>
                </lightning-tab>

                <lightning-tab label="Members">
                    <template if:true={MemberData}>
                        <c-member-list onmemberselected={handleMemberSelected}></c-member-list>
                        
                    </template>
                    <template if:false={MemberData}>
                        <div class="slds-text-heading_medium slds-p-around_medium">
                            No Members found.
                        </div>
                    </template>
                </lightning-tab>
            </lightning-tabset>
        </lightning-card>
    </div>
    
    <c-borrow-manager selected-member-id={selectedMemberId}></c-borrow-manager>
</template>
